services:
  migrate:
    image: ${APP_IMAGE:?set APP_IMAGE}:${APP_TAG:-latest}
    command: alembic upgrade head
    env_file: .env.release
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  api:
    image: ${APP_IMAGE:?set APP_IMAGE}:${APP_TAG:-latest}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env.release
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ${DEPLOY_BASE_PATH:-/opt/huekcb/releases}/downloads:/app/downloads
      - ${DEPLOY_BASE_PATH:-/opt/huekcb/releases}/storage:/app/storage
    restart: unless-stopped

  worker:
    image: ${APP_IMAGE:?set APP_IMAGE}:${APP_TAG:-latest}
    command: celery -A app.modules.tasks.celery_app.celery_app worker --loglevel=INFO
    env_file: .env.release
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    image: ${APP_IMAGE:?set APP_IMAGE}:${APP_TAG:-latest}
    command: celery -A app.modules.tasks.celery_app.celery_app beat --loglevel=INFO
    env_file: .env.release
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kcb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kcb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
