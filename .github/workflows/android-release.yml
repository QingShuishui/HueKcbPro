name: android-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "App version, e.g. 1.0.2"
        required: true
      build_number:
        description: "Android build number, e.g. 12"
        required: true
      notes:
        description: "Release notes"
        required: false
      force_update:
        description: "Force update"
        required: false
        default: "false"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name="${{ inputs.version }}" \
            --build-number="${{ inputs.build_number }}"

      - name: Rename APK artifact
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk "HueKcbPro-${{ inputs.version }}+${{ inputs.build_number }}.apk"

      - name: Compute SHA256
        id: sha
        run: |
          sha256sum "HueKcbPro-${{ inputs.version }}+${{ inputs.build_number }}.apk" | awk '{print $1}' > sha256.txt
          echo "sha256=$(cat sha256.txt)" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "app-v${{ inputs.version }}" >/dev/null 2>&1 || \
          gh release create "app-v${{ inputs.version }}" \
            --title "app-v${{ inputs.version }}" \
            --notes "${{ inputs.notes }}"

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "app-v${{ inputs.version }}" \
            "HueKcbPro-${{ inputs.version }}+${{ inputs.build_number }}.apk" \
            --clobber

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Configure SSH options
        run: |
          echo "SSH_OPTS=-o StrictHostKeyChecking=accept-new" >> "$GITHUB_ENV"

      - name: Ensure release directories exist
        run: |
          ssh ${SSH_OPTS} -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_BASE_PATH }}/downloads' '${{ secrets.DEPLOY_BASE_PATH }}/storage'"

      - name: Upload APK to server
        run: |
          scp ${SSH_OPTS} -P "${{ secrets.DEPLOY_PORT }}" \
            "HueKcbPro-${{ inputs.version }}+${{ inputs.build_number }}.apk" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_BASE_PATH }}/downloads/HueKcbPro-${{ inputs.version }}+${{ inputs.build_number }}.apk"

      - name: Generate latest update metadata
        shell: bash
        env:
          PRIMARY_URL: ${{ secrets.PUBLIC_BASE_URL }}/api/v1/app/update/downloads/HueKcbPro-${{ inputs.version }}+${{ inputs.build_number }}.apk
          FALLBACK_URL: https://github.com/${{ github.repository }}/releases/download/app-v${{ inputs.version }}/HueKcbPro-${{ inputs.version }}+${{ inputs.build_number }}.apk
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          payload = {
              "platform": "android",
              "version": os.environ["INPUT_VERSION"],
              "build_number": int(os.environ["INPUT_BUILD_NUMBER"]),
              "force_update": os.environ["INPUT_FORCE_UPDATE"].lower() == "true",
              "notes": os.environ.get("INPUT_NOTES", ""),
              "primary_apk_url": os.environ["PRIMARY_URL"],
              "fallback_apk_url": os.environ["FALLBACK_URL"],
              "sha256": os.environ["APK_SHA256"],
              "published_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
          }

          with open("latest-android.json", "w", encoding="utf-8") as fh:
              json.dump(payload, fh, ensure_ascii=False, indent=2)
          PY
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
          INPUT_FORCE_UPDATE: ${{ inputs.force_update }}
          INPUT_NOTES: ${{ inputs.notes }}
          APK_SHA256: ${{ steps.sha.outputs.sha256 }}
          PRIMARY_URL: ${{ secrets.PUBLIC_BASE_URL }}/api/v1/app/update/downloads/HueKcbPro-${{ inputs.version }}+${{ inputs.build_number }}.apk
          FALLBACK_URL: https://github.com/${{ github.repository }}/releases/download/app-v${{ inputs.version }}/HueKcbPro-${{ inputs.version }}+${{ inputs.build_number }}.apk

      - name: Upload latest update metadata to server
        run: |
          scp ${SSH_OPTS} -P "${{ secrets.DEPLOY_PORT }}" \
            "latest-android.json" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_BASE_PATH }}/storage/latest-android.json"
